services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: codefest
      POSTGRES_USER: codefest
      POSTGRES_PASSWORD: codefest
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codefest"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://codefest:codefest@db:5432/codefest
      SECRET_KEY: ${SECRET_KEY}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
